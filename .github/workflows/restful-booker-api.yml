name: Restful Booker Tests - API

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  restful-booker-api:
    runs-on: ubuntu-latest

    steps:

    # ── Checkout ────────────────────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── Setup Node ──────────────────────────────────────────────────────────
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    # ── Install dependencies ────────────────────────────────────────────────
    - name: Install dependencies
      run: npm install

    # ── Install Allure CLI ──────────────────────────────────────────────────
    - name: Install Allure CLI
      run: npm install -g allure-commandline

    # ── Create allure-results directory ─────────────────────────────────────
    - name: Create allure-results directory
      run: mkdir -p 02_api/restful_booker/outputs/allure-results

    # ── Run API tests ────────────────────────────────────────────────────────
    - name: Run Restful Booker API tests
      continue-on-error: true
      run: npm run test:restful-booker

    # ── Generate Allure report ───────────────────────────────────────────────
    - name: Generate Allure report
      if: always()
      run: |
        allure generate 02_api/restful_booker/outputs/allure-results \
          --output 02_api/restful_booker/outputs/allure-report

    # ── Upload Allure report ─────────────────────────────────────────────────
    - name: Upload Allure report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report-restful-booker
        path: 02_api/restful_booker/outputs/allure-report
        retention-days: 30

    # ── Quality gate ─────────────────────────────────────────────────────────
    - name: Quality gate — fail on unexpected test failures
      if: always()
      run: node scripts/quality-gates.js restful-booker

    # ── Login to Docker Hub ──────────────────────────────────────────────────
    - name: Login to Docker Hub
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    # ── Build and push Docker image ──────────────────────────────────────────
    - name: Build and push Docker image
      if: github.ref == 'refs/heads/main'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/qa-automation-portfolio:latest