name: deploy-allure-reports-to-pages

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - parabank-ui
      - restful-booker-api
      - automation-exercise-ui-api
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:

    # ── Checkout ─────────────────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── Download available artifacts ──────────────────────────────────────
    - name: Download ParaBank report
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: parabank-ui.yml
        name: allure-report-parabank
        path: report/parabank
        if_no_artifact_found: ignore

    - name: Download Restful Booker report
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: restful-booker-api.yml
        name: allure-report-restful-booker
        path: report/restful-booker
        if_no_artifact_found: ignore

    - name: Download Automation Exercise report
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: automation-exercise.yml
        name: allure-report-automation-exercise
        path: report/automation-exercise
        if_no_artifact_found: ignore

    # ── Generate index page ───────────────────────────────────────────────
    - name: Generate index page
      run: |
        PARABANK_STATUS=$([[ -f report/parabank/index.html ]] && echo "true" || echo "false")
        BOOKER_STATUS=$([[ -f report/restful-booker/index.html ]] && echo "true" || echo "false")
        AE_STATUS=$([[ -f report/automation-exercise/index.html ]] && echo "true" || echo "false")

        cat > report/index.html << EOF
        <!DOCTYPE html>
        <html lang="en">
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>QA Automation Portfolio — Test Reports</title>
          <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
            body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #f6f8fa; color: #24292f; min-height: 100vh; padding: 2rem 1rem; }
            .page { max-width: 860px; margin: 0 auto; }
            .header { background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 14px; }
            .avatar { width: 48px; height: 48px; border-radius: 50%; background: #f6f8fa; border: 1px solid #d0d7de; display: flex; align-items: center; justify-content: center; font-size: 22px; }
            .header-text h1 { font-size: 18px; font-weight: 600; }
            .header-text p { font-size: 13px; color: #57606a; margin-top: 2px; }
            .section-title { font-size: 12px; font-weight: 600; color: #57606a; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; padding: 0 0.25rem; }
            .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
            .card { background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 1rem 1.25rem; text-decoration: none; color: inherit; display: block; transition: border-color 0.15s, box-shadow 0.15s; }
            .card:hover { border-color: #0969da; box-shadow: 0 1px 3px rgba(9,105,218,0.12); }
            .card-disabled { opacity: 0.55; pointer-events: none; cursor: default; }
            .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
            .card-title { display: flex; align-items: center; gap: 10px; }
            .card-icon { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
            .card-icon.blue { background: #ddf4ff; }
            .card-icon.teal { background: #dcfce7; }
            .card-icon.purple { background: #fbefff; }
            .card-name { font-size: 14px; font-weight: 600; color: #0969da; }
            .card-desc { font-size: 12px; color: #57606a; margin-bottom: 10px; line-height: 1.5; }
            .card-footer { display: flex; align-items: center; justify-content: space-between; }
            .badge { font-size: 11px; padding: 2px 8px; border-radius: 2em; font-weight: 500; }
            .badge.playwright { background: #ddf4ff; color: #0550ae; }
            .badge.postman { background: #fff1e5; color: #953800; }
            .status { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 2em; }
            .status.available { background: #dcfce7; color: #1a7f37; }
            .status.unavailable { background: #f6f8fa; color: #57606a; }
            .status.checking { background: #f6f8fa; color: #57606a; }
            .led { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
            .led.green { background: #3fb950; animation: pulse 2s infinite; }
            .led.gray { background: #57606a; opacity: 0.4; }
            .led.checking { background: #57606a; opacity: 0.4; animation: blink 1s infinite; }
            @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
            @keyframes blink { 0%,100%{opacity:0.4} 50%{opacity:1} }
            .footer { display: flex; gap: 1.5rem; padding-top: 1rem; border-top: 1px solid #d0d7de; }
            .footer-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #57606a; text-decoration: none; }
            .footer-item:hover { color: #0969da; }
            @media (prefers-color-scheme: dark) {
              body { background: #0d1117; color: #e6edf3; }
              .header, .card { background: #161b22; border-color: #30363d; }
              .header-text p, .card-desc, .section-title, .footer-item { color: #8b949e; }
              .card-name { color: #58a6ff; }
              .card:hover { border-color: #58a6ff; box-shadow: 0 1px 3px rgba(88,166,255,0.12); }
              .card-icon.blue { background: #0d2039; }
              .card-icon.teal { background: #0d2818; }
              .card-icon.purple { background: #1a0d2e; }
              .badge.playwright { background: #0d2039; color: #58a6ff; }
              .badge.postman { background: #2d1a00; color: #f0883e; }
              .status.available { background: #0d2818; color: #3fb950; }
              .status.unavailable { background: #161b22; color: #8b949e; }
              .status.checking { background: #161b22; color: #8b949e; }
              .footer { border-color: #30363d; }
              .footer-item:hover { color: #58a6ff; }
            }
          </style>
        </head>
        <body>
          <div class="page">
            <div class="header">
              <div class="avatar">🤖</div>
              <div class="header-text">
                <h1>Allure Hub</h1>
                <p>This page centralizes all the Allure reports of my QA Automation Portfolio.</p>
                <p>— Automated test suites with CI/CD pipelines and Allure reporting —</p>
              </div>
            </div>

            <p class="section-title">Open latest Allure reports for:</p>
            <div class="cards" id="cards">
              <a href="parabank/" class="card" id="card-parabank">
                <div class="card-header">
                  <div class="card-title">
                    <div class="card-icon blue">💳</div>
                    <span class="card-name">ParaBank</span>
                  </div>
                  <div class="status checking" id="status-parabank">
                    <span class="led checking" id="led-parabank"></span>
                    <span id="status-text-parabank">Checking...</span>
                  </div>
                </div>
                <p class="card-desc">UI test suite for a banking web application.</p>
                <div class="card-footer">
                  <span class="badge playwright">Playwright</span>
                </div>
              </a>

              <a href="restful-booker/" class="card" id="card-restful-booker">
                <div class="card-header">
                  <div class="card-title">
                    <div class="card-icon teal">🧳</div>
                    <span class="card-name">Restful Booker</span>
                  </div>
                  <div class="status checking" id="status-restful-booker">
                    <span class="led checking" id="led-restful-booker"></span>
                    <span id="status-text-restful-booker">Checking...</span>
                  </div>
                </div>
                <p class="card-desc">API test suite for a hotel booking application.</p>
                <div class="card-footer">
                  <span class="badge postman">Postman / Newman</span>
                </div>
              </a>

              <a href="automation-exercise/" class="card" id="card-automation-exercise">
                <div class="card-header">
                  <div class="card-title">
                    <div class="card-icon purple">🛒</div>
                    <span class="card-name">Automation Exercise</span>
                  </div>
                  <div class="status checking" id="status-automation-exercise">
                    <span class="led checking" id="led-automation-exercise"></span>
                    <span id="status-text-automation-exercise">Checking...</span>
                  </div>
                </div>
                <p class="card-desc">UI & API test suite for an e-commerce web application.</p>
                <div class="card-footer">
                  <span class="badge playwright">Playwright</span>
                </div>
              </a>
            </div>

            <div class="footer">
              <a href="https://github.com/alexB35/qa-automation-portfolio" class="footer-item">🔗 My GitHub</a>
              <a href="https://www.linkedin.com/in/alexandre-bernard-auto-qai-35fr" class="footer-item">💼 My LinkedIn</a>
              <span class="footer-item">🔷 TypeScript · Node.js</span>
            </div>
          </div>

          <script>
            const STATUS = {
              'parabank': ${PARABANK_STATUS},
              'restful-booker': ${BOOKER_STATUS},
              'automation-exercise': ${AE_STATUS}
            };
            Object.entries(STATUS).forEach(([id, available]) => setStatus(id, available));
          </script>
        </body>
        </html>
        EOF

    # ── Setup GitHub Pages ────────────────────────────────────────────────
    - name: Setup GitHub Pages
      uses: actions/configure-pages@v4

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: report

    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4

    # ── Link to reports ────────────────────────────────────────────────────
    - name: Generate link to Allure reports
      if: always()
      run: |
        echo "## 📊 Allure Reports" >> $GITHUB_STEP_SUMMARY
        echo "Click to access the Allure Hub page :" >> $GITHUB_STEP_SUMMARY
        echo "👉 [Allure Hub](https://alexB35.github.io/qa-automation-portfolio/)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "or" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Click to access the latest Allure reports generated by the workflows :" >> $GITHUB_STEP_SUMMARY
        echo "👉 [ParaBank](https://alexB35.github.io/qa-automation-portfolio/parabank/)" >> $GITHUB_STEP_SUMMARY
        echo "👉 [Restful Booker](https://alexB35.github.io/qa-automation-portfolio/restful-booker/)" >> $GITHUB_STEP_SUMMARY
        echo "👉 [Automation Exercise](https://alexB35.github.io/qa-automation-portfolio/automation-exercise/)" >> $GITHUB_STEP_SUMMARY