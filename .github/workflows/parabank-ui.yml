name: ParaBank Tests [UI]

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  parabank-ui:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # Note: Node.js 20 deprecation warnings on actions/checkout@v4, setup-node@v4,
      # upload-artifact@v4 are a known upstream issue pending action maintainer updates.

    steps:

      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Setup Node ──────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # ── Install dependencies ────────────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── Install Playwright browsers ─────────────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps firefox

      # ── Start ParaBank ──────────────────────────────────────────────────────
      - name: Start ParaBank
        run: |
          docker run -d -p 8080:8080 --name parabank parasoft/parabank
          echo "Waiting for ParaBank to be ready..."
          sleep 15
          for i in $(seq 1 20); do
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
              http://localhost:8080/parabank/services/bank/login/john/demo)
            if [ "$HTTP_CODE" = "400" ] || [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "200" ]; then
              echo "ParaBank DB ready after $((i*5 + 15))s"
              break
            fi
            echo "Attempt $i/20... (HTTP $HTTP_CODE)"
            sleep 5
          done

      # ── Install Allure CLI ──────────────────────────────────────────────────
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # ── Create output directories ───────────────────────────────────────────
      - name: Create output directories
        run: |
          mkdir -p 01_banking/parabank/outputs/allure-results
          mkdir -p 01_banking/parabank/outputs/test-results

      # ── Run tests ───────────────────────────────────────────────────────────
      - name: Run ParaBank UI tests
        env:
          CI: true
          PROJECT: parabank
          WORKERS: 2
        run: |
          npx playwright test \
            --project=parabank \
            --reporter=list
        continue-on-error: true

      # ── Generate Allure report ───────────────────────────────────────────────
      - name: Generate Allure report
        if: always()
        run: |
          allure generate 01_banking/parabank/outputs/allure-results \
            --output 01_banking/parabank/outputs/allure-report

      # ── Upload Allure report ─────────────────────────────────────────────────
      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-parabank
          path: 01_banking/parabank/outputs/allure-report
          retention-days: 5

      # ── Upload Playwright test results ───────────────────────────────────────
      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-parabank
          path: 01_banking/parabank/outputs/test-results
          retention-days: 5

      # ── Quality gate ─────────────────────────────────────────────────────────
      - name: Quality gate — fail on unexpected test failures
        if: always()
        run: node scripts/quality-gates.js parabank

      # ── Login to Docker Hub ──────────────────────────────────────────────────
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ── Build and push Docker image ──────────────────────────────────────────
      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/qa-automation-portfolio:latest