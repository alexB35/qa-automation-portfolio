name: parabank-ui

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  parabank-ui:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # Note: Node.js 20 deprecation warnings on actions/checkout@v4, setup-node@v4,
      # upload-artifact@v4 are a known upstream issue pending action maintainer updates.

    steps:

    # ── Checkout ────────────────────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── Setup Node ──────────────────────────────────────────────────────────
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    # ── Install dependencies ────────────────────────────────────────────────
    - name: Install dependencies
      run: npm install

    # ── Cache Playwright browsers ─────────────────────────────────────────────
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-firefox-${{ hashFiles('package-lock.json') }}

    # ── Install Playwright browsers ─────────────────────────────────────────
    - name: Install Playwright browsers
      run: npx playwright install --with-deps firefox

    # ── Install Allure CLI ──────────────────────────────────────────────────
    - name: Install Allure CLI
      run: npm install -g allure

    # ── Create output directories ─────────────────────────────────────────────
    - name: Create Allure output directories
      run: |
        mkdir -p 01_banking/parabank/outputs/allure-results
        mkdir -p 01_banking/parabank/outputs/test-results

    # ── Initialize ParaBank ─────────────────────────────────────────────────────
    - name: Start ParaBank container
      run: |
        docker run -d -p 8080:8080 --name parabank parasoft/parabank
        echo "Waiting for Tomcat..."
        until curl -sf http://localhost:8080/parabank/index.htm > /dev/null 2>&1; do
          sleep 2
        done
        echo "Tomcat ready — DB init will be handled by Playwright global setup"

    # ── Run tests ─────────────────────────────────────────────────────────────
    - name: Run ParaBank test suite
      env:
        CI: true
        PROJECT: parabank
        WORKERS: 2
      run: |
        npx playwright test \
          --project=parabank \
      continue-on-error: true

    # ── Generate Allure report ───────────────────────────────────────────────
    - name: Generate Allure report
      if: always()
      run: |
        allure generate 01_banking/parabank/outputs/allure-results \
          --output 01_banking/parabank/outputs/allure-report

    # ── Quality gate ─────────────────────────────────────────────────────────
    - name: Quality gate — will fail on unexpected test failures
      if: always()
      run: node scripts/quality-gates.js parabank

    # ── Upload artifacts ─────────────────────────────────────────────────
    - name: Upload Allure report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report-parabank
        path: 01_banking/parabank/outputs/allure-report
        retention-days: 5
        overwrite : true

    - name: Upload Playwright test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-results-parabank
        path: 01_banking/parabank/outputs/test-results
        retention-days: 5
        overwrite : true

    # ── Publish Docker image ──────────────────────────────────────────────────
    - name: Login to Docker Hub
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build and push Docker image
      if: github.ref == 'refs/heads/main'
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/qa-automation-portfolio:latest

    # ── Link to reports ────────────────────────────────────────────────────
    - name: Generate link to Allure report
      if: always()
      run: |
        echo "## 📊 Allure Report" >> $GITHUB_STEP_SUMMARY
        echo "Click to access the latest Allure reports generated by the workflow :" >> $GITHUB_STEP_SUMMARY
        echo "👉 [ParaBank](https://alexB35.github.io/qa-automation-portfolio/parabank/)" >> $GITHUB_STEP_SUMMARY