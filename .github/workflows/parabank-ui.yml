name: ParaBank Tests [UI]

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  parabank-ui:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # Note: Node.js 20 deprecation warnings on actions/checkout@v4, setup-node@v4,
      # upload-artifact@v4 are a known upstream issue pending action maintainer updates.

    steps:

    # ── Checkout ────────────────────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── Setup Node ──────────────────────────────────────────────────────────
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    # ── Install dependencies ────────────────────────────────────────────────
    - name: Install dependencies
      run: npm install

    # ── Install Playwright browsers ─────────────────────────────────────────
    - name: Install Playwright browsers
      run: npx playwright install --with-deps firefox

    # ── Start ParaBank ─────────────────────────────────────────────────────
    - name: Start ParaBank
      run: |
        docker run -d -p 8080:8080 --name parabank parasoft/parabank
        sleep 12
        echo "Triggering DB initialization..."
        curl -s http://localhost:8080/parabank/index.htm > /dev/null
        echo "Waiting for DB schema to be created..."
        for i in $(seq 1 30); do
          sleep 2
          RESPONSE=$(curl -s -c /tmp/pb_cookies.txt http://localhost:8080/parabank/register.htm > /dev/null && \
            curl -s -b /tmp/pb_cookies.txt -X POST "http://localhost:8080/parabank/register.htm" \
            -d "customer.firstName=Init&customer.lastName=User&customer.address.street=1+Main+St&customer.address.city=NY&customer.address.state=NY&customer.address.zipCode=10001&customer.phoneNumber=0123456789&customer.ssn=000-00-0001&customer.username=init_user_ci&customer.password=Test123!&repeatedPassword=Test123!")
          if echo "$RESPONSE" | grep -q "Your account was created successfully"; then
            echo "DB ready and schema initialized after ${i}x2s"
            break
          fi
          echo "Attempt $i/30..."
        done

    - name: Check admin page
      run: |
        curl -s http://localhost:8080/parabank/admin.htm | grep -o 'action="[^"]*"\|value="[^"]*"\|name="[^"]*"' | head -30


    - name: Check ParaBank logs
      run: docker logs parabank 2>&1 | tail -50   

    - name: Smoke test register
      run: |
        COOKIE=$(curl -s -c /tmp/parabank_cookies.txt http://localhost:8080/parabank/register.htm > /dev/null && cat /tmp/parabank_cookies.txt | grep JSESSIONID | awk '{print $NF}')
        RESPONSE=$(curl -s -b /tmp/parabank_cookies.txt -X POST "http://localhost:8080/parabank/register.htm" \
          -d "customer.firstName=John&customer.lastName=Doe&customer.address.street=123+Main+St&customer.address.city=New+York&customer.address.state=NY&customer.address.zipCode=10001&customer.phoneNumber=0123456789&customer.ssn=999-99-9999&customer.username=ci_smoke_user&customer.password=Test123!&repeatedPassword=Test123!")
        echo "$RESPONSE" | grep -o "Your account was created successfully\|An internal error\|This username already exists" || echo "No match"

    - name: Check ParaBank logs after register attempt
      run: docker logs parabank 2>&1 | grep -A 20 "ERROR\|Exception" | tail -40

    # ── Install Allure CLI ──────────────────────────────────────────────────
    - name: Install Allure CLI
      run: npm install -g allure-commandline

    # ── Create output directories ─────────────────────────────────────────────
    - name: Create output directories
      run: |
        mkdir -p 01_banking/parabank/outputs/allure-results
        mkdir -p 01_banking/parabank/outputs/test-results

     
    
    # ── Run tests ─────────────────────────────────────────────────────────────
    - name: Run ParaBank UI tests
      env:
        CI: true
        PROJECT: parabank
        WORKERS: 1
      run: |
        npx playwright test \
          --project=parabank \
          --reporter=list
      continue-on-error: true

    # ── Generate Allure report ───────────────────────────────────────────────
    - name: Generate Allure report
      if: always()
      run: |
        allure generate 01_banking/parabank/outputs/allure-results \
          --output 01_banking/parabank/outputs/allure-report

    # ── Upload Allure report ─────────────────────────────────────────────────
    - name: Upload Allure report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report-parabank
        path: 01_banking/parabank/outputs/allure-report
        retention-days: 5

    # ── Upload Playwright test results ───────────────────────────────────────
    - name: Upload Playwright test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-results-parabank
        path: 01_banking/parabank/outputs/test-results
        retention-days: 5

    # ── Quality gate ─────────────────────────────────────────────────────────
    - name: Quality gate — fail on unexpected test failures
      if: always()
      run: node scripts/quality-gates.js parabank

    # ── Login to Docker Hub ──────────────────────────────────────────────────
    - name: Login to Docker Hub
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    # ── Build and push Docker image ──────────────────────────────────────────
    - name: Build and push Docker image
      if: github.ref == 'refs/heads/main'
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/qa-automation-portfolio:latest