name: ParaBank Tests - UI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  parabank-ui:
    runs-on: ubuntu-latest

    steps:

    # ── Checkout ────────────────────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── Setup Node ──────────────────────────────────────────────────────────
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    # ── Install dependencies ────────────────────────────────────────────────
    - name: Install dependencies
      run: npm install

    # ── Install Playwright browsers ─────────────────────────────────────────
    - name: Install Playwright browsers
      run: npx playwright install --with-deps firefox

    # ── Install Allure CLI ──────────────────────────────────────────────────
    - name: Install Allure CLI
      run: npm install -g allure-commandline

    # ── Create allure-results directory ─────────────────────────────────────
    - name: Create allure-results directory
      run: mkdir -p 01_banking/parabank/outputs/allure-results

    # ── Run tests ───────────────────────────────────────────────────────────
    - name: Run ParaBank UI tests
      env:
        CI: true
        PROJECT: parabank
      run: |
        npx playwright test \
          --project=setup-parabank \
          --project=parabank \
          --reporter=list
      continue-on-error: true

    # ── Generate Allure report ───────────────────────────────────────────────
    - name: Generate Allure report
      if: always()
      run: |
        allure generate 01_banking/parabank/outputs/allure-results \
          --output 01_banking/parabank/outputs/allure-report

    # ── Upload Allure report ─────────────────────────────────────────────────
    - name: Upload Allure report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report-parabank
        path: 01_banking/parabank/outputs/allure-report
        retention-days: 30

    # ── Upload Playwright test results ───────────────────────────────────────
    - name: Upload Playwright test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-results-parabank
        path: 01_banking/parabank/outputs/test-results
        retention-days: 30

    # ── Quality gate ─────────────────────────────────────────────────────────
    - name: Quality gate — fail on unexpected test failures
      if: always()
      run: node scripts/quality-gates.js parabank

    # ── Login to Docker Hub ──────────────────────────────────────────────────
    - name: Login to Docker Hub
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    # ── Build and push Docker image ──────────────────────────────────────────
    - name: Build and push Docker image
      if: github.ref == 'refs/heads/main'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/qa-automation-portfolio:latest