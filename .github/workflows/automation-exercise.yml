name: Automation Exercise Tests - UI + API

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  automation-exercise:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:

    # ================================
    # Checkout repository
    # ================================
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── Setup Node ──────────────────────────────────────────────────────────
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    # ── Install dependencies ────────────────────────────────────────────────
    - name: Install dependencies
      run: npm install

    # ── Install Playwright browsers ─────────────────────────────────────────
    - name: Install Playwright browsers
      run: npx playwright install --with-deps firefox

    # ── Install Allure CLI ──────────────────────────────────────────────────
    - name: Install Allure CLI
      run: npm install -g allure-commandline

    # ── Create allure-results directory ─────────────────────────────────────
    - name: Create allure-results directory
      run: mkdir -p 03_ecommerce/automation-exercise/outputs/allure-results

    # ── Run tests ───────────────────────────────────────────────────────────
    - name: Run Automation Exercise tests
      id: run_tests
      env:
        CI: true
        PROJECT: automation-exercise
      run: |
        npx playwright test \
          --project=automation-exercise \
          --reporter=list
      continue-on-error: true

    # ── Generate Allure report ───────────────────────────────────────────────
    - name: Generate Allure report
      if: always()
      run: |
        allure generate 03_ecommerce/automation-exercise/outputs/allure-results \
          --output 03_ecommerce/automation-exercise/outputs/allure-report

    # ── Upload Allure report ─────────────────────────────────────
    - name: Upload Allure report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report-automation-exercise
        path: 03_ecommerce/automation-exercise/outputs/allure-report
        retention-days: 30

    # ── Upload Playwright test results ───────────────────────────────────────
    - name: Upload Playwright test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-results-automation-exercise
        path: 03_ecommerce/automation-exercise/outputs/test-results
        retention-days: 30

    # ── Quality gate ─────────────────────────────────────────────────────────
    - name: Quality gate — fail on unexpected test failures
      if: always()
      run: node scripts/quality-gates.js automation-exercise

    # ── Deploy Allure report to GitHub Pages ─────────────────────────────────
    - name: Deploy Allure report to GitHub Pages
      if: github.ref == 'refs/heads/main' && always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: 03_ecommerce/automation-exercise/outputs/allure-report
        destination_dir: automation-exercise

    # ── Login to Docker Hub ──────────────────────────────────────────────────
    - name: Login to Docker Hub
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    # ── Build and push Docker image ──────────────────────────────────────────
    - name: Build and push Docker image
      if: github.ref == 'refs/heads/main'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/qa-automation-portfolio:latest