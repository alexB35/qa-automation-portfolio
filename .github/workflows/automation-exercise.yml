name: Automation Exercise Tests [UI / API]

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  automation-exercise:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # Note: Node.js 20 deprecation warnings on actions/checkout@v4, setup-node@v4,
      # upload-artifact@v4 are a known upstream issue pending action maintainer updates.

    steps:

    # ── Checkout repository ─────────────────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── Setup Node ──────────────────────────────────────────────────────────
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    # ── Install dependencies ────────────────────────────────────────────────
    - name: Install dependencies
      run: npm install

    # ── Playwright browser cache ─────────────────────────────────────────────
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-firefox-${{ hashFiles('package-lock.json') }}

    # ── Install Playwright browsers ─────────────────────────────────────────
    - name: Install Playwright browsers
      run: npx playwright install --with-deps firefox

    # ── Install Allure CLI ──────────────────────────────────────────────────
    - name: Install Allure CLI
      run: npm install -g allure-commandline

    # ── Create output directories ─────────────────────────────────────────────
    - name: Create Allure output directories
      run: |
        mkdir -p 03_ecommerce/automation-exercise/outputs/allure-results
        mkdir -p 03_ecommerce/automation-exercise/outputs/test-results

    # ── Run tests ───────────────────────────────────────────────────────────
    - name: Run Automation Exercise tests
      env:
        CI: true
        PROJECT: automation-exercise
      run: |
        npx playwright test \
          --project=automation-exercise \
      continue-on-error: true

    # ── Generate Allure report ───────────────────────────────────────────────
    - name: Generate Allure report
      if: always()
      run: |
        allure generate 03_ecommerce/automation-exercise/outputs/allure-results \
          --output 03_ecommerce/automation-exercise/outputs/allure-report \
          --clean

    # ── Upload Allure report ─────────────────────────────────────
    - name: Upload Allure report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report-automation-exercise
        path: 03_ecommerce/automation-exercise/outputs/allure-report
        retention-days: 5

    # ── Upload Playwright test results ───────────────────────────────────────
    - name: Upload Playwright test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-results-automation-exercise
        path: 03_ecommerce/automation-exercise/outputs/test-results
        retention-days: 5

    # ── Quality gate ─────────────────────────────────────────────────────────
    - name: Quality gate — will fail on unexpected test failures
      if: always()
      run: node scripts/quality-gates.js automation-exercise

    # ── Deploy Allure report to GitHub Pages ─────────────────────────────────
    - name: Deploy Allure report to GitHub Pages
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: 03_ecommerce/automation-exercise/outputs/allure-report
        destination_dir: automation-exercise

    # ── Publish Docker image ──────────────────────────────────────────────────
    - name: Login to Docker Hub
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build and push Docker image
      if: github.ref == 'refs/heads/main'
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/qa-automation-portfolio:latest

    # ── Open Allure report ──────────────────────────────────────────────────
    - name: Link to Allure report
      if: always()
      run: |
        echo "## 📊 Allure Test Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "👉 [Open Allure Report](https://alexB35.github.io/qa-automation-portfolio/automation-exercise/)" >> $GITHUB_STEP_SUMMARY