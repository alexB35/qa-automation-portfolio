name: 🧪 Restful Booker – API Tests (Newman)

on:
  push:
    paths:
      - '02_api/restful_booker/5_postman/**'
      - '.github/workflows/restful-booker-newman.yml'
  pull_request:
    paths:
      - '02_api/restful_booker/5_postman/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  newman:
    name: Run Newman Collections
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Newman and HTML reporter
        run: npm install -g newman newman-reporter-htmlextra

      - name: 🔐 RFB-00 – Prerequisites (Auth)
        run: |
          newman run "02_api/restful_booker/5_postman/collections/RFB-00 - Prerequisites.postman_collection.json" \
            --environment "02_api/restful_booker/5_postman/environments/RFB_Environment.postman_environment.json" \
            --export-environment /tmp/rfb_env.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export 02_api/restful_booker/outputs/RFB-00-report.html \
            --reporter-htmlextra-title "RFB-00 – Prerequisites"

      - name: 📝 RFB-01 – Create Booking
        run: |
          newman run "02_api/restful_booker/5_postman/collections/RFB-01 - Create Booking.postman_collection.json" \
            --environment /tmp/rfb_env.json \
            --export-environment /tmp/rfb_env.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export 02_api/restful_booker/outputs/RFB-01-report.html \
            --reporter-htmlextra-title "RFB-01 – Create Booking" \
            --suppress-exit-code

      - name: 🔍 RFB-02 – Retrieve Booking
        run: |
          newman run "02_api/restful_booker/5_postman/collections/RFB-02 - Retrieve Booking.postman_collection.json" \
            --environment /tmp/rfb_env.json \
            --export-environment /tmp/rfb_env.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export 02_api/restful_booker/outputs/RFB-02-report.html \
            --reporter-htmlextra-title "RFB-02 – Retrieve Booking" \
            --suppress-exit-code

      - name: ✏️ RFB-03 – Update Booking
        run: |
          newman run "02_api/restful_booker/5_postman/collections/RFB-03 - Update Booking.postman_collection.json" \
            --environment /tmp/rfb_env.json \
            --export-environment /tmp/rfb_env.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export 02_api/restful_booker/outputs/RFB-03-report.html \
            --reporter-htmlextra-title "RFB-03 – Update Booking"

      - name: 🗑️ RFB-04 – Delete Booking
        run: |
          newman run "02_api/restful_booker/5_postman/collections/RFB-04 - Delete Booking.postman_collection.json" \
            --environment /tmp/rfb_env.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export 02_api/restful_booker/outputs/RFB-04-report.html \
            --reporter-htmlextra-title "RFB-04 – Delete Booking"

      - name: 📊 Upload HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: 02_api/restful_booker/outputs/*.html
          retention-days: 30