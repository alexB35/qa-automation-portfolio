services:
  parabank:
    image: parasoft/parabank
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/parabank/index.htm"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 45s

  tests:
    build: .
    depends_on:
      parabank:
        condition: service_healthy
    volumes:
      - ./reports:/app/outputs
    environment:
      - CI=true
      - WORKERS=2
      - PARABANK_URL=http://parabank:8080